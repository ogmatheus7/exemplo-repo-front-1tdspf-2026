<!DOCYTYPE html> 
<!--
 O doctype é um DTD ou é o Document Type Definition, ele informa ao navegador o 
tipo de documento HTML que está sendo carregado, este que estamos utilizando é a versão 5.

-->

<!--
1. Crie um arquivo chamado index.html e utilize as tags essenciais para estruturar corretamente sua página.
2. O documento HTML deve conter as tags de estrutura básica
3. A Página deverá suportar caracteres especiais
4. O Título da página deve ser "Minha Primeira Página HTML"

-->
<html lang="pt-br">

	<head>
		<meta charset="UTF-8">
		<title>Minha Primeira Página HTML</title>
	</head>
	
	<body>
		<header>
			<h1>Minha Primeira Página HTML </h1>
		</header>
		<main>
			<section>
			<h2>Seção-1</h2>
			<p>Esta página é apenas para testes de estrutura.</p>
			</section>
			</main>
			<footer>
				<p>Minha Primeira Página &copy; - 2026</p>
				</footer>
	</body>

</html>
